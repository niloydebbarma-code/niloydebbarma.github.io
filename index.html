                        <a href="${proj.link}" target="_blank" class="group relative bg-cyber-glass border border-cyber-border p-6 rounded hover:bg-cyber-glassHover transition-all duration-300 flex flex-col h-full overflow-hidden">
                            <!-- Tech Badge -->
                            <div class="absolute top-4 right-4 text-xs font-mono text-cyber-dim opacity-50 group-hover:opacity-100 transition-opacity">
                                [${proj.focus}]
                            </div>
                            
                            <h3 class="text-xl font-bold text-white mb-2 font-sans group-hover:text-cyber-primary transition-colors">${proj.title}</h3>
                            <p class="text-xs font-mono text-cyber-secondary mb-4">${proj.tech}</p>
                            
                            <p class="text-gray-400 text-sm mb-6 leading-relaxed flex-grow">${proj.description}</p>
                            
                            <div class="mt-auto flex items-center gap-2 text-xs font-mono text-cyber-dim group-hover:text-white transition-colors border-t border-cyber-border pt-3">
                                <i data-lucide="terminal" class="w-3 h-3"></i> View Source
                            </div>
                        </a>
                    `).join('')}
                </div>
            </div>`;
        }

        function renderLeadership() {
            return `
            <div class="h-full overflow-y-auto pr-2 pb-20 animate-slide-in">
                ${SectionTitle("Impact", "Community & Service")}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                    ${COMMUNITY.map(item => `
                        <div class="bg-cyber-glass border border-cyber-border p-6 rounded flex flex-col h-full">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-white">${item.role}</h3>
                                <span class="text-xs font-mono bg-white/5 px-2 py-1 rounded text-cyber-dim">${item.type}</span>
                            </div>
                            <p class="text-cyber-secondary text-sm font-mono mb-4">${item.org}</p>
                            <p class="text-gray-400 text-sm mt-auto border-t border-cyber-border pt-4">${item.description}</p>
                        </div>
                    `).join('')}
                </div>

                 <div class="bg-gradient-to-r from-cyber-dark to-black border border-cyber-border p-8 rounded relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5">
                        <i data-lucide="award" class="w-32 h-32"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2"><i data-lucide="award" class="text-cyber-accent"></i> Awards & Recognition</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8">
                         ${AWARDS.map(award => `
                            <div class="flex items-baseline gap-4 border-b border-cyber-border pb-2">
                                <span class="font-mono text-xs text-cyber-dim w-12">${award.date}</span>
                                <div>
                                    <p class="text-white font-medium text-sm">${award.title}</p>
                                    <p class="text-xs text-gray-500">${award.org}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
            `;
        }

        function renderSkills() {
            return `
            <div class="h-full overflow-y-auto pr-2 pb-20 animate-slide-in">
                ${SectionTitle("Stack", "Technical Arsenal")}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                    ${Object.entries(SKILLS).map(([category, items]) => `
                        <div class="bg-cyber-glass border border-cyber-border rounded p-6">
                            <h3 class="text-lg font-bold text-cyber-primary mb-6 font-mono border-b border-cyber-border pb-2">
                                // ${category}
                            </h3>
                            <div class="grid grid-cols-2 gap-3">
                                ${items.map(skill => `
                                    <div class="flex items-center gap-2 text-sm text-gray-300">
                                        <span class="w-1 h-1 bg-cyber-secondary rounded-full"></span>
                                        ${skill}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="p-6 border border-cyber-border rounded bg-cyber-primary/5 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h4 class="text-white font-bold text-lg mb-1">Education</h4>
                        <p class="text-gray-400 text-sm">${EDUCATION.school} | ${EDUCATION.location}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-cyber-primary font-mono font-bold">${EDUCATION.degree}</p>
                        <p class="text-cyber-dim text-xs font-mono mt-1">${EDUCATION.period}</p>
                    </div>
                </div>
            </div>`;
        }

        // --- NAVIGATION LOGIC ---

        function renderSidebar() {
            const navContainer = document.getElementById('nav-items');
            const currentHash = window.location.hash || '#home';
            const cleanHash = currentHash === '#home' || currentHash === '' ? 'home' : currentHash.substring(1);

            navContainer.innerHTML = SECTIONS.map(section => {
                const isActive = section.id === cleanHash;
                return `
                    <a href="#${section.id}" 
                       class="group relative transition-all duration-300 flex items-center md:justify-center shrink-0
                       /* Mobile Styles */
                       w-full px-4 py-4 md:p-3 md:w-12 md:h-12 md:rounded
                       ${isActive ? 
                           'bg-cyber-primary/10 text-cyber-primary md:bg-cyber-primary md:text-black md:shadow-[0_0_20px_rgba(0,240,255,0.4)]' : 
                           'text-gray-500 hover:text-white hover:bg-white/5 md:hover:bg-white/10'}"
                    >
                        <i data-lucide="${section.icon}" class="w-5 h-5 shrink-0"></i>
                        
                        <!-- Mobile Label (Inline, Visible) -->
                        <span class="md:hidden ml-4 font-mono font-bold tracking-widest uppercase text-sm ${isActive ? 'text-white' : ''}">
                            ${section.label}
                        </span>
                        
                        <!-- Desktop Tooltip (Floating, Absolute) -->
                        <span class="hidden md:block absolute left-14 bg-cyber-black border border-cyber-border px-3 py-2 text-xs opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none text-white tracking-widest uppercase font-mono shadow-xl">
                            ${section.label}
                        </span>
                    </a>
                `;
            }).join('');
            
            // Re-init icons for sidebar
            lucide.createIcons();
        }

        function router() {
            const root = document.getElementById('app-root');
            const hash = window.location.hash || '#home';
            
            // Update Sidebar State
            renderSidebar();
            
            // Render Content
            switch(hash) {
                case '#home': root.innerHTML = renderHome(); break;
                case '#experience': root.innerHTML = renderExperience(); break;
                case '#research': root.innerHTML = renderResearch(); break;
                case '#projects': root.innerHTML = renderProjects(); break;
                case '#leadership': root.innerHTML = renderLeadership(); break;
                case '#skills': root.innerHTML = renderSkills(); break;
                case '#contact': root.innerHTML = renderContact(); break;
                default: root.innerHTML = renderHome();
            }

            // Close mobile menu if open
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('translate-x-0')) {
                sidebar.classList.add('-translate-x-full');
                sidebar.classList.remove('translate-x-0');
            }

            // Re-init icons for content
            lucide.createIcons();
        }

        // --- NEURAL BACKGROUND LOGIC ---

        function initNeuralBackground() {
            const canvas = document.getElementById('neural-bg');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            let particles = [];
            const particleCount = window.innerWidth < 768 ? 30 : 50;
            const connectionDistance = 180;
            const mouse = { x: 0, y: 0 };

            class Particle {
                constructor(w, h) {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 1.5 + 0.5;
                }
                update(w, h) {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > w) this.vx *= -1;
                    if (this.y < 0 || this.y > h) this.vy *= -1;
                    
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        this.x += dx * 0.01;
                        this.y += dy * 0.01;
                    }
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = '#00f0ff';
                    ctx.fill();
                }
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(canvas.width, canvas.height));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.update(canvas.width, canvas.height);
                    p.draw(ctx);
                });

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(0, 240, 255, ${0.15 * (1 - dist / connectionDistance)})`;
                            ctx.lineWidth = 0.5;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', e => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            
            resize();
            animate();
        }

        // --- INITIALIZATION ---

        window.addEventListener('DOMContentLoaded', () => {
            // Redirect /index.html to /
            if (window.location.pathname === '/index.html') {
                window.location.href = '/';
            }

            initNeuralBackground();
            
            const menuBtn = document.getElementById('menu-btn');
            const sidebar = document.getElementById('sidebar');
            menuBtn.addEventListener('click', () => {
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    sidebar.classList.add('translate-x-0');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    sidebar.classList.remove('translate-x-0');
                }
            });

            window.addEventListener('hashchange', router);
            router();
        });

    </script>
</body>
